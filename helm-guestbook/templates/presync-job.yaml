apiVersion: batch/v1
kind: Job
metadata:
  name: busybox
  annotations:
  # phase executions
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: busybox
        image: busybox
        command:
        - sh
        - -c
        - echo "Running database migrations..." && sleep 10
      restartPolicy: Never
---
